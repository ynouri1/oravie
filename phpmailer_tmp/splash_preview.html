<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aperçu Splash — ORAVIE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    @keyframes splashFadeIn  { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes splashFloat   { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
    @keyframes splashBarFill { from { width:0%; } to { width:100%; } }

    body {
      background: linear-gradient(160deg, #f0f5ec 0%, #dce9d4 50%, #c8dfc0 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }

    #splash-tagline {
      font-family: 'Playfair Display', serif;
      font-size: 2vw;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4A735C;
      opacity: 0;
      animation: splashFadeIn 0.7s ease 0.2s forwards;
      margin-bottom: 3vh;
    }
    #splash-img {
      width: 30vw;
      max-width: 380px;
      min-width: 140px;
      filter: drop-shadow(0 2vw 4vw rgba(47,75,60,0.22));
      opacity: 0;
      animation: splashFadeIn 0.8s ease 0.5s forwards,
                 splashFloat 3.5s ease-in-out 1.3s infinite;
    }
    #splash-brand {
      font-family: 'Playfair Display', serif;
      font-size: 7vw;
      font-weight: 700;
      color: #2F4B3C;
      letter-spacing: 1vw;
      opacity: 0;
      animation: splashFadeIn 0.7s ease 0.9s forwards;
      margin-top: 3vh;
    }
    #splash-sub {
      font-family: 'Inter', sans-serif;
      font-size: 1.4vw;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #92A389;
      opacity: 0;
      animation: splashFadeIn 0.7s ease 1.1s forwards;
      margin-top: 1vh;
    }
    #splash-bar-wrap {
      width: 18vw;
      min-width: 120px;
      height: 2px;
      background: rgba(47,75,60,0.15);
      border-radius: 2px;
      margin-top: 4vh;
      opacity: 0;
      animation: splashFadeIn 0.5s ease 1.3s forwards;
      overflow: hidden;
    }
    #splash-bar {
      height: 2px; width: 0%;
      background: #C6A43F;
      border-radius: 2px;
      animation: splashBarFill 2.8s ease 1.5s forwards;
    }
    #splash-skip {
      position: absolute;
      bottom: 3vh; right: 2vw;
      background: rgba(47,75,60,0.08);
      color: #4A735C;
      border: 1px solid rgba(47,75,60,0.2);
      border-radius: 2rem;
      padding: 0.8vh 2vw;
      font-size: 1.2vw;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      opacity: 0;
      animation: splashFadeIn 0.5s ease 1.5s forwards;
    }
    #splash-skip:hover { background: rgba(47,75,60,0.15); }
  </style>
</head>
<body>
  <div id="splash-tagline">Pureté Professionnelle</div>
  <img id="splash-img" src="https://www.oravie.tn/spray5.png" alt="ORAVIE">
  <div id="splash-brand">ORAVIE</div>
  <div id="splash-sub">Soin Naturel &bull; 100% Naturel</div>
  <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
  <button id="splash-skip">Passer ›</button>
</body>
</html>
